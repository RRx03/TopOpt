<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TopOpt Studio</title>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <header id="brand">
          <h1>TopOpt Studio</h1>
          <span class="sub">M4 — editor · results · run (local/remote)</span>
          <nav id="mode-tabs">
            <button class="mode-tab active" data-mode="editor">editor</button>
            <button class="mode-tab" data-mode="results">results</button>
          </nav>
        </header>
        <div id="editor-side">
          <section id="load-panel"></section>
          <section id="bc-panel"></section>
          <section id="export-panel"></section>
          <section id="run-panel"></section>
        </div>
        <div id="results-side" hidden></div>
      </aside>
      <main id="viewport"></main>
      <main id="results-viewport" hidden></main>
      <div id="gui-panel"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
